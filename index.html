<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Sistem Verifikasi Data</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#eef2f7;
margin:0;
}

.header{
background:#1b4f9c;
color:white;
text-align:center;
padding:15px;
font-weight:bold;
font-size:18px;
}

.container{
max-width:500px;
margin:20px auto;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 3px 12px rgba(0,0,0,0.15);
}

.title{
text-align:center;
font-size:20px;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
background:#1b4f9c;
color:white;
border:none;
border-radius:6px;
font-size:16px;
}

.table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

.table td{
padding:10px;
border-bottom:1px solid #eee;
}

.status{
color:green;
font-weight:bold;
}

.qr{
text-align:center;
margin-top:20px;
}

.pdfbtn{
margin-top:15px;
background:#28a745;
}

</style>

</head>

<body>

<div class="header">
SISTEM VERIFIKASI DATA ONLINE
</div>

<div class="container">

<div class="title">
DATA SRUT
</div>

<input id="nomor" placeholder="Masukkan nomor data">

<button onclick="DATA KENDARAAN : ()">Cek Data</button>

<div id="hasil"></div>

</div>

<script>

let database={

"218417":{
NO. SRUT
489911/VIII/SRUT-596/DJPD-SPD/02/2024

NO.SK RANCANG BANGUN
KP-DJPD 8358 TAHUN 2023

MEREK
HINO/XZU349R-HKFTBD3/(4X2) M/T

nama:"BUDI SANTOSO",
merk:"HONDA",
tipe:"SCOOPY",
tahun:"2023",
rangka:"MH1JM1234PK123456",
mesin:"JM12E3456789",
status:"VALID"
}

}

function cekData(){

let id=document.getElementById("nomor").value
let data=database[id]

if(!data){

document.getElementById("hasil").innerHTML="<p style='color:red;text-align:center'>DATA TIDAK DITEMUKAN</p>"
return

}

document.getElementById("hasil").innerHTML=`

<table class="table">

<tr><td>Nomor Data</td><td>${id}</td></tr>
<tr><td>Nama Pemilik</td><td>${data.nama}</td></tr>
<tr><td>Merk</td><td>${data.merk}</td></tr>
<tr><td>Tipe Kendaraan</td><td>${data.tipe}</td></tr>
<tr><td>Tahun</td><td>${data.tahun}</td></tr>
<tr><td>Nomor Rangka</td><td>${data.rangka}</td></tr>
<tr><td>Nomor Mesin</td><td>${data.mesin}</td></tr>
<tr><td>Status</td><td class="status">${data.status}</td></tr>

</table>

<div class="qr">
<img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${id}">
</div>

<button class="pdfbtn" onclick="downloadPDF('${id}','${data.nama}','${data.tipe}')">
Download Sertifikat
</button>

`

}

function downloadPDF(id,nama,tipe){

let isi=`
SERTIFIKAT VERIFIKASI DATA

Nomor : ${id}
Nama : ${nama}
Kendaraan : ${tipe}
Status : VALID
`

let blob=new Blob([isi],{type:"text/plain"})
let link=document.createElement("a")

link.href=URL.createObjectURL(blob)
link.download="sertifikat_"+id+".txt"

link.click()

}

let params=new URLSearchParams(window.location.search)
let id=params.get("id")

if(id){
document.getElementById("nomor").value=id
cekData()
}

</script>

</body>
</html>
