<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Sistem Verifikasi Data</title>

<style>

body{
font-family:Arial, sans-serif;
background:#eef2f7;
margin:0;
}

.header{
background:#1b4f9c;
color:white;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{
width:520px;
margin:60px auto;
background:white;
border-radius:10px;
box-shadow:0 5px 18px rgba(0,0,0,0.18);
padding:35px;
}

.title{
text-align:center;
font-size:22px;
margin-bottom:25px;
font-weight:bold;
}

.inputBox{
text-align:center;
margin-bottom:20px;
}

input{
padding:10px;
width:65%;
border:1px solid #ccc;
border-radius:5px;
font-size:16px;
}

button{
padding:10px 18px;
background:#1b4f9c;
color:white;
border:none;
border-radius:5px;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#163f7a;
}

.result{
margin-top:25px;
display:none;
}

.table{
width:100%;
border-collapse:collapse;
font-size:16px;
}

.table td{
padding:12px;
border-bottom:1px solid #eee;
}

.status{
color:#11a63c;
font-weight:bold;
}

.qr{
text-align:center;
margin-top:20px;
}

.footer{
text-align:center;
font-size:12px;
color:#777;
margin-top:25px;
}

</style>

</head>

<body>

<div class="header">
SISTEM VERIFIKASI DATA ONLINE
</div>

<div class="container">

<div class="title">
CEK DATA
</div>

<div class="inputBox">
<input type="text" id="nomor" placeholder="Masukkan nomor data">
<button onclick="cekData()">Cek</button>
</div>

<div class="result" id="hasil">

<table class="table">

<tr>
<td>Nomor Data</td>
<td id="id"></td>
</tr>

<tr>
<td>Status Verifikasi</td>
<td class="status">VALID</td>
</tr>

<tr>
<td>Tanggal Verifikasi</td>
<td id="date"></td>
</tr>

</table>

<div class="qr">
<img id="qr" width="120">
</div>

</div>

<div class="footer">
Halaman ini menampilkan hasil verifikasi data secara otomatis.
</div>

</div>

<script>

function cekData(){

let id = document.getElementById("nomor").value

if(id == ""){
alert("Masukkan nomor data")
return
}

document.getElementById("hasil").style.display="block"

document.getElementById("id").innerText=id

let today = new Date().toLocaleDateString()

document.getElementById("date").innerText=today

document.getElementById("qr").src =
"https://api.qrserver.com/v1/create-qr-code/?size=120x120&data="+id

}

</script>

</body>
</html>
